<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bone Cycle - 火柴人自行车闯关游戏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Microsoft YaHei', sans-serif;
    }
    #gameContainer {
      position: relative;
    }
    canvas {
      border: 2px solid #e94560;
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
    }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #fff;
      font-size: 16px;
    }
    #controls {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: #aaa;
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="ui">
      <div id="score">分数: 0</div>
      <div id="lives">生命: ❤️❤️❤️</div>
    </div>
    <div id="controls">
      方向键: 移动 | 空格: 跳跃 | R: 重来 | ESC: 暂停
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
